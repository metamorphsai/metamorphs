<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" aria-label="Metamorphs">
  <defs>
    <radialGradient id="mx-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffd1a8" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#ff7a30" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ff5a3c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mx-petal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ffc066"/>
      <stop offset="55%" stop-color="#ff7a30"/>
      <stop offset="100%" stop-color="#c84a18"/>
    </linearGradient>
    <linearGradient id="mx-rim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ffe2b8"/>
      <stop offset="100%" stop-color="#8a3414"/>
    </linearGradient>
  </defs>

  <!-- soft outer glow -->
  <circle cx="100" cy="100" r="95" fill="url(#mx-glow)"/>

  <!-- 6 hexagonal petals arranged around the center -->
  <g transform="translate(100 100)" stroke="url(#mx-rim)" stroke-width="3" stroke-linejoin="round">
    <g>
      <polygon points="-16,-34 16,-34 34,-78 -34,-78" fill="url(#mx-petal)"/>
    </g>
    <g transform="rotate(60)">
      <polygon points="-16,-34 16,-34 34,-78 -34,-78" fill="url(#mx-petal)"/>
    </g>
    <g transform="rotate(120)">
      <polygon points="-16,-34 16,-34 34,-78 -34,-78" fill="url(#mx-petal)"/>
    </g>
    <g transform="rotate(180)">
      <polygon points="-16,-34 16,-34 34,-78 -34,-78" fill="url(#mx-petal)"/>
    </g>
    <g transform="rotate(240)">
      <polygon points="-16,-34 16,-34 34,-78 -34,-78" fill="url(#mx-petal)"/>
    </g>
    <g transform="rotate(300)">
      <polygon points="-16,-34 16,-34 34,-78 -34,-78" fill="url(#mx-petal)"/>
    </g>
  </g>

  <!-- inner highlight dot for depth -->
  <circle cx="100" cy="100" r="8" fill="#ffd9a8" opacity="0.55"/>
</svg>
